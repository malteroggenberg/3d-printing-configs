# load filament
[gcode_macro M701]
gcode:
    SAVE_GCODE_STATE NAME=loading_filament
    M117 Loading Filament
    M83
    G92 E0.0
    M109 S240
    G1 E370 F100  # length of bowden tube till cold-end (~420mm) 
    G1 E50 F100  # some extra to prime the nozzle --> slower 
    G92 E0.0
    RESTORE_GCODE_STATE NAME=loading_filament


#unload filament
[gcode_macro M702]
gcode:
    SAVE_GCODE_STATE NAME=unloading_filament
    M125 # park
    M117 Unloading Filament 
    M109 S240
    G91 # set relative
    G1 E10 F100 
    G92 E0.0
    G1 E-400 F100 # the E is the length of the bowden tube (150) + 50 mm. 
    G92 E0.0
    RESTORE_GCODE_STATE NAME=unloading_filament      
    

[gcode_macro RESUME_MACRO]
gcode:
    RESUME

[gcode_macro G29]
gcode:
    G28
    G1 Z10 F600
    BED_MESH_CALIBRATE
    G0 X1 Y0 F3000