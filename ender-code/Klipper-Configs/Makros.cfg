[gcode_macro UNLOAD]
gcode:
    G91
    M104 S240
    G1 E5.0 F1200
    G1 E3.0 F1600
    G1 E-10 F7000
    G1 E-90 F3000
    G90
        
[gcode_macro PAUSE_MACRO]
gcode:
	PAUSE
	PARK_MACRO
	
[gcode_macro PURGE]
gcode:
    G91
    G1 E50 F250
    G90
    
[gcode_macro petg]
gcode:
	M140 S85  ;set bed temperature and do not wait
	M109 S240 ;set print head temperature and wait

[gcode_macro pla]
gcode:
	M140 S45  ;set bed temperature and do not wait
	M109 S190 ;set print head temperature and wait

