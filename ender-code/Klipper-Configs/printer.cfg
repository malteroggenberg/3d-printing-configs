[include Makros.cfg]
[include InputShaper.cfg]

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
#step_distance: .0125
endstop_pin: ^PC0
position_endstop: 1
position_max: 249 #eig 235, aber damit man das bl touch maxen kann...
homing_speed: 60
microsteps: 16
rotation_distance:40

[tmc2209 stepper_x]
uart_pin: PB15
#microsteps: 16
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 250

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
#step_distance: .0125
endstop_pin: ^PC1
position_endstop: -4
position_max: 235 #da kann ich nicht höher
position_min: -4
homing_speed: 60
microsteps: 16 #hoffentlich passt das
rotation_distance:40

[tmc2209 stepper_y]
uart_pin: PC6
#microsteps: 16
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 250

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
#step_distance: .0025
#endstop_pin: ^PC2
endstop_pin: probe:z_virtual_endstop # For bltouch
position_min: -6
position_max: 250
microsteps: 16
rotation_distance: 8

[tmc2209 stepper_z]
uart_pin: PC10
#microsteps: 16
run_current: 0.750
hold_current: 0.500
stealthchop_threshold: 5

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
#step_distance: 0,0024697
pressure_advance: 0.0785
nozzle_diameter: 0.400
filament_diameter: 1.750
rotation_distance: 22.95 # Calculated distance #hoffentlich passt das 
microsteps: 16
gear_ratio: 3:1 # BMG gear ratio #mein extruder hat zufällig auch 3:1
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control = pid
pid_kp = 27.585 #geändert
pid_ki = 1.383 #geändert
pid_kd = 137.580 #geändert
min_temp: 0
max_temp: 250
#max_power: 0.5 # For stock 12v heater

[tmc2209 extruder]
uart_pin: PC11
#microsteps: 16
run_current: 0.650 # For normal motor, for pancacke motor 0.850
hold_current: 0.500
stealthchop_threshold: 5

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
#control = pid
#pid_kp = 73.550 #geändert
#pid_ki = 1.472 #geändert
#pid_kd = 918.460 #geändert
min_temp: 0
max_temp: 130
#max_power: 0.5 # for stock 12v heater

[fan]
pin: PA8
kick_start_time: 0.750

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_36FFDB055252343531810443-if00
baud: 250000


[printer]
kinematics: cartesian
max_velocity: 400 #geändert von 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

######################################################################
# Bl-Touch
######################################################################

[bltouch]
sensor_pin: ^PC2 #geändert deswegen ist Bltouch jetzt auf dem Z-endstop pin
control_pin: PA1
pin_up_touch_mode_reports_triggered: False
x_offset: -41
y_offset: -6
z_offset: 1.950
#also vorher war bei z_offset kein -,  mal gucken ob ich das noch adden muss
pin_move_time: 0.4
speed:2
samples: 1

#[homing_override]
#axes: z
#gcode:
#    G90; 
#    G1 Z10;
#    G28 X Y;
#    G1 X55 Y21 F6000;  # Setze die gewünschte XY-Position für das Z-Homing
#    G28 Z;
#    G1 Z20 F500;
#
#set_position_z: 0.0

[safe_z_home]
home_xy_position: 55,21 # changes based on probe offsets also muss ich das nochmal anpassen + offsets
speed: 50
z_hop: 10
z_hop_speed: 20

[bed_mesh]
speed: 80
horizontal_move_z: 5
speed: 3000
mesh_min: 14, 15 #die 14 kommen vom ausprobieren, sah bisschen komisch aus weil er nochmal leicht nach rechts ging
mesh_max: 208, 229
probe_count: 4,4
mesh_pps: 2,2
fade_start: 1
fade_end: 10
fade_target: 0
#####################################################################

[virtual_sdcard]
path: /home/Malte/.octoprint/uploads
#   The path of the local directory on the host machine to look for
#   g-code files. This is a read-only directory (sdcard file writes
#   are not supported). One may point this to OctoPrint's upload
#   directory (generally ~/.octoprint/uploads/ ). This parameter must
#   be provided.
#on_error_gcode:
#   A list of G-Code commands to execute when an error is reported.

[firmware_retraction]
retract_speed: 40
retract_length: 1.5

[static_digital_output usb_pullup_enable]
pins: !PC13

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5, EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PB6, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB7, EXP1_10=<5V>


######################################################################
# 128x64 Full Graphic Creality CR10 / ENDER 3 stockdisplay
######################################################################

# This section is used for a Creality "12864" display with a single
# ribbon cable between the display's EXP3 plug and the
# micro-controller board's EXP1 connector.

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

